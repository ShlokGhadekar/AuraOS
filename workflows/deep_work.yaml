name: Deep Work Mode
id: deep_work
description: Enter a focused deep work session on a specific project
triggers:
  - "deep work"
  - "focus mode"
  - "start focus session"

steps:
  - name: Quit distracting apps
    tool: quit_apps
    params:
      apps: ["Slack", "Discord", "Mail", "Messages"]

  - name: Open project in VS Code
    tool: open_vscode_workspace
    params:
      path: "{active_project_path}"
    skip_if_missing: ["active_project_path"]

  - name: Notify
    tool: send_notification
    params:
      title: "Deep Work Mode"
      message: "Distractions closed. Time to build."